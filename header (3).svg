<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260">
  <defs>
    <style>
      @keyframes glitch {
        0%,88%,100%{transform:translate(0,0)}
        89%{transform:translate(-3px,1px)}
        91%{transform:translate(3px,-1px)}
        93%{transform:translate(-2px,2px)}
        95%{transform:translate(0,0)}
      }
      @keyframes gc {
        0%,87%,100%{opacity:0}
        88%{opacity:.55;transform:translate(5px,0)}
        90%{opacity:.3;transform:translate(-4px,0)}
        92%{opacity:0}
      }
      @keyframes gp {
        0%,86%,100%{opacity:0}
        87%{opacity:.45;transform:translate(-5px,0)}
        89%{opacity:.25;transform:translate(4px,0)}
        91%{opacity:0}
      }
      @keyframes floatA { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-9px)} }
      @keyframes floatB { 0%,100%{transform:translateY(-5px)} 50%{transform:translateY(5px)} }
      @keyframes floatC { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(7px)} }
      @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.15} }
      @keyframes scan   { 0%{transform:translateY(0);opacity:0} 4%{opacity:.1} 96%{opacity:.1} 100%{transform:translateY(262px);opacity:0} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideL { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
      @keyframes slideR { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

      .ct { fill:#0b1e2e; stroke:#00d4ff; stroke-width:.8; }
      .cl { fill:#050d17; stroke:#00d4ff; stroke-width:.8; }
      .cr { fill:#030a12; stroke:#00d4ff; stroke-width:.8; }

      .fA { animation: floatA 3.8s ease-in-out infinite; }
      .fB { animation: floatB 4.6s ease-in-out infinite; }
      .fC { animation: floatC 5.4s ease-in-out infinite; }

      .nm  { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#00d4ff; letter-spacing:12px; filter:url(#nameglow); animation:glitch 9s ease-in-out infinite; }
      .ngc { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#00d4ff; letter-spacing:12px; filter:url(#nameglow); opacity:0; animation:gc 9s ease-in-out infinite; }
      .ngp { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#a855f7; letter-spacing:12px; filter:url(#nameglow); opacity:0; animation:gp 9s ease-in-out infinite; }
      .brk { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#a855f7; }
      .bkL { animation: slideL .7s .1s both; }
      .bkR { animation: slideR .7s .1s both; }

      .pill  { animation: fadeUp .5s .05s both; }
      .pdot  { fill:#00d4ff; animation:pulse 2.2s ease-in-out infinite; }
      .ptxt  { font-family:'Courier New',Courier,monospace; font-size:10.5px; fill:#00d4ff; letter-spacing:2.5px; animation:fadeUp .5s .05s both; }
      .line1 { font-family:'Courier New',Courier,monospace; font-size:12px; fill:#a855f7; letter-spacing:4px; animation:fadeUp .6s .5s both; }
      .line2 { font-family:'Courier New',Courier,monospace; font-size:11px; fill:#c9d1d9; letter-spacing:1.5px; animation:fadeUp .6s .85s both; }
      .line3 { font-family:'Courier New',Courier,monospace; font-size:10.5px; fill:#8892b0; letter-spacing:2px; animation:fadeUp .6s 1.1s both; }
      .abar  { fill:#a855f7; animation:fadeUp .6s 1s both; }
      .scanl { fill:none; stroke:#00d4ff; stroke-width:.5; animation:scan 5.5s linear infinite; }
    </style>
    <filter id="cubeglow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="nameglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" fill="#0a0a12"/>
  <!-- Subtle mid line -->
  <line x1="0" y1="130" x2="1000" y2="130" stroke="#00d4ff" stroke-width=".3" opacity=".1"/>
  <!-- Scan line -->
  <line class="scanl" x1="0" y1="0" x2="1000" y2="0"/>

  <!--
    ISOMETRIC PYRAMID — mathematically consistent
    Unit: cube W=40, H_top=20, H_face=26
    Top face rhombus: (cx-20,y) (cx,y-10) (cx+20,y) (cx,y+10)
    Left face: bottom-left of top → go down 26
    Right face: bottom-right of top → go down 26

    Apex center: cx=820, y_apex_top=30
    Each row: y increases by 20 (half height of top face)
              left edge moves -20 per cube added
  -->

  <!-- ROW 1 — 1 cube, apex, cx=820 ytop=30 -->
  <g class="fC" filter="url(#cubeglow)">
    <polygon class="ct" points="800,30 820,20 840,30 820,40"/>
    <polygon class="cl" points="800,30 820,40 820,66 800,56"/>
    <polygon class="cr" points="820,40 840,30 840,56 820,66"/>
  </g>

  <!-- ROW 2 — 2 cubes, ytop=50 -->
  <g class="fB" filter="url(#cubeglow)">
    <!-- cx=800 -->
    <polygon class="ct" points="780,50 800,40 820,50 800,60"/>
    <polygon class="cl" points="780,50 800,60 800,86 780,76"/>
    <polygon class="cr" points="800,60 820,50 820,76 800,86"/>
    <!-- cx=840 -->
    <polygon class="ct" points="820,50 840,40 860,50 840,60"/>
    <polygon class="cl" points="820,50 840,60 840,86 820,76"/>
    <polygon class="cr" points="840,60 860,50 860,76 840,86"/>
  </g>

  <!-- ROW 3 — 3 cubes, ytop=70 -->
  <g class="fA" filter="url(#cubeglow)">
    <!-- cx=780 -->
    <polygon class="ct" points="760,70 780,60 800,70 780,80"/>
    <polygon class="cl" points="760,70 780,80 780,106 760,96"/>
    <polygon class="cr" points="780,80 800,70 800,96 780,106"/>
    <!-- cx=820 -->
    <polygon class="ct" points="800,70 820,60 840,70 820,80"/>
    <polygon class="cl" points="800,70 820,80 820,106 800,96"/>
    <polygon class="cr" points="820,80 840,70 840,96 820,106"/>
    <!-- cx=860 -->
    <polygon class="ct" points="840,70 860,60 880,70 860,80"/>
    <polygon class="cl" points="840,70 860,80 860,106 840,96"/>
    <polygon class="cr" points="860,80 880,70 880,96 860,106"/>
  </g>

  <!-- ROW 4 — 4 cubes, ytop=90 -->
  <g class="fB" filter="url(#cubeglow)">
    <!-- cx=760 -->
    <polygon class="ct" points="740,90 760,80 780,90 760,100"/>
    <polygon class="cl" points="740,90 760,100 760,126 740,116"/>
    <polygon class="cr" points="760,100 780,90 780,116 760,126"/>
    <!-- cx=800 -->
    <polygon class="ct" points="780,90 800,80 820,90 800,100"/>
    <polygon class="cl" points="780,90 800,100 800,126 780,116"/>
    <polygon class="cr" points="800,100 820,90 820,116 800,126"/>
    <!-- cx=840 -->
    <polygon class="ct" points="820,90 840,80 860,90 840,100"/>
    <polygon class="cl" points="820,90 840,100 840,126 820,116"/>
    <polygon class="cr" points="840,100 860,90 860,116 840,126"/>
    <!-- cx=880 -->
    <polygon class="ct" points="860,90 880,80 900,90 880,100"/>
    <polygon class="cl" points="860,90 880,100 880,126 860,116"/>
    <polygon class="cr" points="880,100 900,90 900,116 880,126"/>
  </g>

  <!-- ROW 5 — 3 cubes base, ytop=110 -->
  <g class="fC" filter="url(#cubeglow)">
    <!-- cx=780 -->
    <polygon class="ct" points="760,110 780,100 800,110 780,120"/>
    <polygon class="cl" points="760,110 780,120 780,146 760,136"/>
    <polygon class="cr" points="780,120 800,110 800,136 780,146"/>
    <!-- cx=820 -->
    <polygon class="ct" points="800,110 820,100 840,110 820,120"/>
    <polygon class="cl" points="800,110 820,120 820,146 800,136"/>
    <polygon class="cr" points="820,120 840,110 840,136 820,146"/>
    <!-- cx=860 -->
    <polygon class="ct" points="840,110 860,100 880,110 860,120"/>
    <polygon class="cl" points="840,110 860,120 860,146 840,136"/>
    <polygon class="cr" points="860,120 880,110 880,136 860,146"/>
  </g>

  <!-- Platform glow + dot -->
  <ellipse cx="820" cy="150" rx="90" ry="8" fill="#00d4ff" opacity=".05" filter="url(#cubeglow)"/>
  <circle class="pdot" cx="820" cy="157" r="4.5" filter="url(#cubeglow)"/>

  <!-- ── LEFT TEXT BLOCK ── -->

  <!-- Status pill -->
  <g class="pill">
    <rect x="40" y="34" width="258" height="24" rx="12"
          fill="#00d4ff" fill-opacity=".07"
          stroke="#00d4ff" stroke-width=".7" stroke-opacity=".5"/>
    <circle class="pdot" cx="56" cy="46" r="3.5"/>
    <text class="ptxt" x="68" y="51">SYSTEM_ONLINE: READY_TO_WORK</text>
  </g>

  <!-- Name layers -->
  <text class="ngc" x="40" y="148">SKYONIX</text>
  <text class="ngp" x="40" y="148">SKYONIX</text>
  <text class="nm"  x="40" y="148">SKYONIX</text>

  <!-- Brackets -->
  <text class="brk bkL" x="16" y="148">▸</text>
  <text class="brk bkR" x="556" y="148">◂</text>

  <!-- Subtitles -->
  <text class="line1" x="42" y="174">VOID ARCHITECT  //  FULL-STACK 3D DEV</text>
  <rect class="abar" x="42" y="184" width="2.5" height="44" rx="1"/>
  <text class="line2" x="52" y="200">Full-Stack Developer &amp; Software Engineer</text>
  <text class="line3" x="52" y="220">🇲🇦 Morocco  ·  Open to remote  ·  GMT+1</text>
</svg>
