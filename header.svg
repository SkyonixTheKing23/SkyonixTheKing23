<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
  <defs>
    <style>
      /* ── GLITCH on name ── */
      @keyframes glitch-main {
        0%,90%,100% { transform: translate(0,0); }
        91%          { transform: translate(-3px, 1px); }
        92%          { transform: translate( 3px,-1px); }
        93%          { transform: translate(-2px, 2px); }
        94%          { transform: translate( 2px,-2px); }
        95%          { transform: translate(0,0); }
      }
      @keyframes glitch-r {
        0%,89%,100% { opacity:0; transform:translate(0,0); }
        90%          { opacity:.7; transform:translate(4px,0); clip-path:inset(20% 0 50% 0); }
        92%          { opacity:.5; transform:translate(-4px,0); clip-path:inset(60% 0 10% 0); }
        94%          { opacity:0; }
      }
      @keyframes glitch-b {
        0%,88%,100% { opacity:0; transform:translate(0,0); }
        89%          { opacity:.6; transform:translate(-3px,0); clip-path:inset(40% 0 30% 0); }
        91%          { opacity:.4; transform:translate(3px,0); clip-path:inset(10% 0 70% 0); }
        93%          { opacity:0; }
      }
      /* ── cube float ── */
      @keyframes float-a {
        0%,100% { transform:translateY(0px); }
        50%      { transform:translateY(-6px); }
      }
      @keyframes float-b {
        0%,100% { transform:translateY(-3px); }
        50%      { transform:translateY(3px); }
      }
      @keyframes float-c {
        0%,100% { transform:translateY(-5px); }
        50%      { transform:translateY(1px); }
      }
      /* ── pulse dot ── */
      @keyframes pulse {
        0%,100% { r:4; opacity:1; }
        50%      { r:7; opacity:.5; }
      }
      /* ── glow breathe ── */
      @keyframes glow {
        0%,100% { opacity:.55; }
        50%      { opacity:1; }
      }
      /* ── scan line ── */
      @keyframes scan {
        0%   { transform:translateY(-10px); opacity:0; }
        10%  { opacity:.18; }
        90%  { opacity:.18; }
        100% { transform:translateY(290px); opacity:0; }
      }
      /* ── subtitle fade in ── */
      @keyframes fadein {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      /* ── bracket slide ── */
      @keyframes slide-l {
        from { transform:translateX(-18px); opacity:0; }
        to   { transform:translateX(0); opacity:1; }
      }
      @keyframes slide-r {
        from { transform:translateX(18px); opacity:0; }
        to   { transform:translateX(0); opacity:1; }
      }

      .bg       { fill:#0a0a12; }
      .cube-top { fill:#0d1f2d; stroke:#00d4ff; stroke-width:.8; }
      .cube-l   { fill:#071520; stroke:#00d4ff; stroke-width:.8; }
      .cube-r   { fill:#050e18; stroke:#00d4ff; stroke-width:.8; }
      .glow-line{ stroke:#00d4ff; stroke-width:1; fill:none; opacity:.3; animation:glow 3s ease-in-out infinite; }
      .name     { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#00d4ff; letter-spacing:8px; animation:glitch-main 6s infinite; }
      .name-r   { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#a855f7; letter-spacing:8px; opacity:0; animation:glitch-r 6s infinite; }
      .name-b   { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#3b82f6; letter-spacing:8px; opacity:0; animation:glitch-b 6s infinite; }
      .bracket  { font-family:'Courier New',Courier,monospace; font-size:72px; font-weight:700; fill:#a855f7; }
      .bl       { animation:slide-l .8s .1s both; }
      .br       { animation:slide-r .8s .1s both; }
      .sub      { font-family:'Courier New',Courier,monospace; font-size:13px; fill:#8892b0; letter-spacing:3px; animation:fadein .8s .6s both; }
      .status   { font-family:'Courier New',Courier,monospace; font-size:11px; fill:#00d4ff; letter-spacing:2px; animation:fadein .8s .9s both; }
      .dot      { fill:#00d4ff; animation:pulse 2s ease-in-out infinite; }
      .scan     { fill:none; stroke:#00d4ff; stroke-width:1; animation:scan 4s linear infinite; }
      .fa       { animation:float-a 3.5s ease-in-out infinite; transform-origin:center; }
      .fb       { animation:float-b 4s ease-in-out infinite; transform-origin:center; }
      .fc       { animation:float-c 4.8s ease-in-out infinite; transform-origin:center; }
    </style>

    <!-- cyan glow filter -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="name-glow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect class="bg" width="860" height="280"/>

  <!-- subtle grid lines -->
  <line class="glow-line" x1="0" y1="140" x2="860" y2="140"/>
  <line class="glow-line" x1="430" y1="0" x2="430" y2="280" opacity=".15"/>

  <!-- scan line -->
  <line class="scan" x1="0" y1="0" x2="860" y2="0"/>

  <!-- ═══════════════════════════════
       ISOMETRIC CUBE GRID (right side)
       mirrors your website hero
  ════════════════════════════════ -->
  <!-- cube helper: top parallelogram + left face + right face -->
  <!-- Row 1 (top, 2 cubes) -->
  <g class="fc" filter="url(#cyan-glow)">
    <!-- cube 1,1 -->
    <polygon class="cube-top" points="620,80 650,65 680,80 650,95"/>
    <polygon class="cube-l"   points="620,80 650,95 650,125 620,110"/>
    <polygon class="cube-r"   points="650,95 680,80 680,110 650,125"/>
    <!-- cube 1,2 -->
    <polygon class="cube-top" points="650,65 680,50 710,65 680,80"/>
    <polygon class="cube-l"   points="650,65 680,80 680,110 650,95"/>
    <polygon class="cube-r"   points="680,80 710,65 710,95 680,110"/>
  </g>
  <!-- Row 2 (3 cubes) -->
  <g class="fb" filter="url(#cyan-glow)">
    <polygon class="cube-top" points="590,95 620,80 650,95 620,110"/>
    <polygon class="cube-l"   points="590,95 620,110 620,140 590,125"/>
    <polygon class="cube-r"   points="620,110 650,95 650,125 620,140"/>

    <polygon class="cube-top" points="620,110 650,95 680,110 650,125"/>
    <polygon class="cube-l"   points="620,110 650,125 650,155 620,140"/>
    <polygon class="cube-r"   points="650,125 680,110 680,140 650,155"/>

    <polygon class="cube-top" points="650,95 680,80 710,95 680,110"/>
    <polygon class="cube-l"   points="650,95 680,110 680,140 650,125"/>
    <polygon class="cube-r"   points="680,110 710,95 710,125 680,140"/>
  </g>
  <!-- Row 3 (4 cubes) -->
  <g class="fa" filter="url(#cyan-glow)">
    <polygon class="cube-top" points="560,110 590,95 620,110 590,125"/>
    <polygon class="cube-l"   points="560,110 590,125 590,155 560,140"/>
    <polygon class="cube-r"   points="590,125 620,110 620,140 590,155"/>

    <polygon class="cube-top" points="590,125 620,110 650,125 620,140"/>
    <polygon class="cube-l"   points="590,125 620,140 620,170 590,155"/>
    <polygon class="cube-r"   points="620,140 650,125 650,155 620,170"/>

    <polygon class="cube-top" points="620,140 650,125 680,140 650,155"/>
    <polygon class="cube-l"   points="620,140 650,155 650,185 620,170"/>
    <polygon class="cube-r"   points="650,155 680,140 680,170 650,185"/>

    <polygon class="cube-top" points="650,125 680,110 710,125 680,140"/>
    <polygon class="cube-l"   points="650,125 680,140 680,170 650,155"/>
    <polygon class="cube-r"   points="680,140 710,125 710,155 680,170"/>
  </g>
  <!-- Row 4 (3 cubes, base) -->
  <g class="fb" filter="url(#cyan-glow)">
    <polygon class="cube-top" points="560,140 590,125 620,140 590,155"/>
    <polygon class="cube-l"   points="560,140 590,155 590,185 560,170"/>
    <polygon class="cube-r"   points="590,155 620,140 620,170 590,185"/>

    <polygon class="cube-top" points="590,155 620,140 650,155 620,170"/>
    <polygon class="cube-l"   points="590,155 620,170 620,200 590,185"/>
    <polygon class="cube-r"   points="620,170 650,155 650,185 620,200"/>

    <polygon class="cube-top" points="620,170 650,155 680,170 650,185"/>
    <polygon class="cube-l"   points="620,170 650,185 650,215 620,200"/>
    <polygon class="cube-r"   points="650,185 680,170 680,200 650,215"/>
  </g>

  <!-- glow platform shadow -->
  <ellipse cx="635" cy="215" rx="90" ry="10" fill="#00d4ff" opacity=".07" filter="url(#cyan-glow)"/>

  <!-- pulse dot (the teal dot from your site) -->
  <circle class="dot" cx="650" cy="220" filter="url(#cyan-glow)"/>

  <!-- ═══════════════════════════════
       LEFT — TEXT BLOCK
  ════════════════════════════════ -->

  <!-- status pill -->
  <rect x="52" y="52" width="230" height="22" rx="4" fill="none" stroke="#00d4ff" stroke-width=".8" opacity=".6"/>
  <circle class="dot" cx="65" cy="63" r="3"/>
  <text class="status" x="76" y="67">SYSTEM_ONLINE: READY_TO_WORK</text>

  <!-- glitch name layers (stacked, offset for glitch) -->
  <text class="name-r" x="50" y="152" filter="url(#name-glow)">SKYONIX</text>
  <text class="name-b" x="50" y="152" filter="url(#name-glow)">SKYONIX</text>
  <text class="name"   x="50" y="152" filter="url(#name-glow)">SKYONIX</text>

  <!-- brackets -->
  <text class="bracket bl" x="30"  y="152">▸</text>
  <text class="bracket br" x="490" y="152">◂</text>

  <!-- subtitle -->
  <text class="sub" x="52" y="183">VOID ARCHITECT  //  FULL-STACK 3D DEVELOPER</text>

  <!-- divider line (left border accent from site) -->
  <rect x="50" y="195" width="2" height="38" fill="#a855f7" opacity=".8"/>
  <text class="sub" x="62" y="210" style="fill:#c9d1d9;letter-spacing:1px;font-size:12px;animation:fadein .8s 1.1s both;">Full-Stack Developer &amp; Software Engineer</text>
  <text class="sub" x="62" y="228" style="animation:fadein .8s 1.3s both;">Morocco 🇲🇦  ·  Open to remote  ·  GMT+1</text>
</svg>
