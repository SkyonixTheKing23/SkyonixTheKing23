<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280">
  <defs>
    <style>
      @keyframes glitch {
        0%,88%,100%{transform:translate(0,0)}
        89%{transform:translate(-3px,1px)}
        91%{transform:translate(3px,-1px)}
        93%{transform:translate(-2px,2px)}
        95%{transform:translate(0,0)}
      }
      @keyframes gc {
        0%,87%,100%{opacity:0}
        88%{opacity:.5;transform:translate(5px,0)}
        90%{opacity:.3;transform:translate(-4px,0)}
        92%{opacity:0}
      }
      @keyframes gp {
        0%,86%,100%{opacity:0}
        87%{opacity:.4;transform:translate(-5px,0)}
        89%{opacity:.2;transform:translate(4px,0)}
        91%{opacity:0}
      }
      @keyframes floatA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes floatB { 0%,100%{transform:translateY(-5px)} 50%{transform:translateY(5px)} }
      @keyframes floatC { 0%,100%{transform:translateY(-2px)} 50%{transform:translateY(7px)} }
      @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.15} }
      @keyframes scan   { 0%{transform:translateY(0);opacity:0} 4%{opacity:.09} 96%{opacity:.09} 100%{transform:translateY(282px);opacity:0} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes slideL { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
      @keyframes slideR { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

      .ct{fill:#0b1e2e;stroke:#00d4ff;stroke-width:.8}
      .cl{fill:#050d17;stroke:#00d4ff;stroke-width:.8}
      .cr{fill:#030a12;stroke:#00d4ff;stroke-width:.8}
      .fA{animation:floatA 3.8s ease-in-out infinite}
      .fB{animation:floatB 4.6s ease-in-out infinite}
      .fC{animation:floatC 5.4s ease-in-out infinite}

      /* Name — centered in left half (0–580), so mid = 290 */
      .nm {font-family:'Courier New',Courier,monospace;font-size:70px;font-weight:700;fill:#00d4ff;letter-spacing:10px;animation:glitch 9s ease-in-out infinite}
      .ngc{font-family:'Courier New',Courier,monospace;font-size:70px;font-weight:700;fill:#00d4ff;letter-spacing:10px;opacity:0;animation:gc 9s ease-in-out infinite}
      .ngp{font-family:'Courier New',Courier,monospace;font-size:70px;font-weight:700;fill:#a855f7;letter-spacing:10px;opacity:0;animation:gp 9s ease-in-out infinite}
      .brk{font-family:'Courier New',Courier,monospace;font-size:70px;font-weight:700;fill:#a855f7}
      .bkL{animation:slideL .7s .1s both}
      .bkR{animation:slideR .7s .1s both}

      .pill {animation:fadeUp .5s .05s both}
      .pdot {fill:#00d4ff;animation:pulse 2.2s ease-in-out infinite}
      .ptxt {font-family:'Courier New',Courier,monospace;font-size:10.5px;fill:#00d4ff;letter-spacing:2px}
      .sub1 {font-family:'Courier New',Courier,monospace;font-size:11.5px;fill:#a855f7;letter-spacing:4px;animation:fadeUp .6s .5s both}
      .sub2 {font-family:'Courier New',Courier,monospace;font-size:11px;fill:#c9d1d9;letter-spacing:1.5px;animation:fadeUp .6s .85s both}
      .sub3 {font-family:'Courier New',Courier,monospace;font-size:10.5px;fill:#8892b0;letter-spacing:2px;animation:fadeUp .6s 1.1s both}
      .abar {fill:#a855f7}
      .scanl{fill:none;stroke:#00d4ff;stroke-width:.5;animation:scan 5.5s linear infinite}
    </style>
    <filter id="cg"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="ng"><feGaussianBlur stdDeviation="6" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" fill="#0a0a12"/>

  <!-- Vertical divider — subtle line between text and cubes -->
  <line x1="580" y1="20" x2="580" y2="260" stroke="#00d4ff" stroke-width=".4" opacity=".12"/>

  <!-- Scan line -->
  <line class="scanl" x1="0" y1="0" x2="1000" y2="0"/>

  <!-- ═══════════════════════════════════════════
       CUBE PYRAMID — right half, centered at x=790
       Unit: W=40, Htop=20, Hface=26
       Rows: 1-2-3-4-3 (symmetric diamond)
  ═══════════════════════════════════════════ -->

  <!-- ROW 1 — apex, cx=790 ytop=40 -->
  <g class="fC" filter="url(#cg)">
    <polygon class="ct" points="770,50 790,40 810,50 790,60"/>
    <polygon class="cl" points="770,50 790,60 790,86 770,76"/>
    <polygon class="cr" points="790,60 810,50 810,76 790,86"/>
  </g>

  <!-- ROW 2 — 2 cubes, ytop=70 -->
  <g class="fB" filter="url(#cg)">
    <polygon class="ct" points="750,70 770,60 790,70 770,80"/>
    <polygon class="cl" points="750,70 770,80 770,106 750,96"/>
    <polygon class="cr" points="770,80 790,70 790,96 770,106"/>

    <polygon class="ct" points="790,70 810,60 830,70 810,80"/>
    <polygon class="cl" points="790,70 810,80 810,106 790,96"/>
    <polygon class="cr" points="810,80 830,70 830,96 810,106"/>
  </g>

  <!-- ROW 3 — 3 cubes, ytop=90 -->
  <g class="fA" filter="url(#cg)">
    <polygon class="ct" points="730,90 750,80 770,90 750,100"/>
    <polygon class="cl" points="730,90 750,100 750,126 730,116"/>
    <polygon class="cr" points="750,100 770,90 770,116 750,126"/>

    <polygon class="ct" points="770,90 790,80 810,90 790,100"/>
    <polygon class="cl" points="770,90 790,100 790,126 770,116"/>
    <polygon class="cr" points="790,100 810,90 810,116 790,126"/>

    <polygon class="ct" points="810,90 830,80 850,90 830,100"/>
    <polygon class="cl" points="810,90 830,100 830,126 810,116"/>
    <polygon class="cr" points="830,100 850,90 850,116 830,126"/>
  </g>

  <!-- ROW 4 — 4 cubes (widest), ytop=110 -->
  <g class="fB" filter="url(#cg)">
    <polygon class="ct" points="710,110 730,100 750,110 730,120"/>
    <polygon class="cl" points="710,110 730,120 730,146 710,136"/>
    <polygon class="cr" points="730,120 750,110 750,136 730,146"/>

    <polygon class="ct" points="750,110 770,100 790,110 770,120"/>
    <polygon class="cl" points="750,110 770,120 770,146 750,136"/>
    <polygon class="cr" points="770,120 790,110 790,136 770,146"/>

    <polygon class="ct" points="790,110 810,100 830,110 810,120"/>
    <polygon class="cl" points="790,110 810,120 810,146 790,136"/>
    <polygon class="cr" points="810,120 830,110 830,136 810,146"/>

    <polygon class="ct" points="830,110 850,100 870,110 850,120"/>
    <polygon class="cl" points="830,110 850,120 850,146 830,136"/>
    <polygon class="cr" points="850,120 870,110 870,136 850,146"/>
  </g>

  <!-- ROW 5 — 3 cubes base, ytop=130 -->
  <g class="fC" filter="url(#cg)">
    <polygon class="ct" points="730,130 750,120 770,130 750,140"/>
    <polygon class="cl" points="730,130 750,140 750,166 730,156"/>
    <polygon class="cr" points="750,140 770,130 770,156 750,166"/>

    <polygon class="ct" points="770,130 790,120 810,130 790,140"/>
    <polygon class="cl" points="770,130 790,140 790,166 770,156"/>
    <polygon class="cr" points="790,140 810,130 810,156 790,166"/>

    <polygon class="ct" points="810,130 830,120 850,130 830,140"/>
    <polygon class="cl" points="810,130 830,140 830,166 810,156"/>
    <polygon class="cr" points="830,140 850,130 850,156 830,166"/>
  </g>

  <!-- Platform glow + pulse dot -->
  <ellipse cx="790" cy="172" rx="90" ry="8" fill="#00d4ff" opacity=".05" filter="url(#cg)"/>
  <circle class="pdot" cx="790" cy="178" r="5" filter="url(#cg)"/>

  <!-- ═══════════════════════════════════════════
       LEFT TEXT BLOCK — all centered in x=0..580
       Name anchor x=290 (dead center of left half)
  ═══════════════════════════════════════════ -->

  <!-- Status pill — wide enough to hold full phrase -->
  <!-- "SYSTEM_ONLINE: READY_TO_WORK" = ~30 chars × 7px ≈ 210px + padding = 270px -->
  <g class="pill">
    <rect x="100" y="34" width="282" height="24" rx="12"
          fill="#00d4ff" fill-opacity=".07"
          stroke="#00d4ff" stroke-width=".7" stroke-opacity=".55"/>
    <circle class="pdot" cx="116" cy="46" r="3.5"/>
    <text class="ptxt" x="128" y="51">SYSTEM_ONLINE: READY_TO_WORK</text>
  </g>

  <!-- Glitch name layers — centered at x=290 -->
  <text class="ngc" x="290" y="152" text-anchor="middle" filter="url(#ng)">SKYONIX</text>
  <text class="ngp" x="290" y="152" text-anchor="middle" filter="url(#ng)">SKYONIX</text>
  <text class="nm"  x="290" y="152" text-anchor="middle" filter="url(#ng)">SKYONIX</text>

  <!-- Brackets flanking the name — spaced so they don't touch the cubes -->
  <text class="brk bkL" x="38"  y="152" text-anchor="middle">▸</text>
  <text class="brk bkR" x="542" y="152" text-anchor="middle">◂</text>

  <!-- Subtitle lines — centered under the name -->
  <text class="sub1" x="290" y="178" text-anchor="middle">VOID ARCHITECT  //  FULL-STACK 3D DEV</text>

  <!-- Left-border accent block -->
  <rect class="abar" x="100" y="190" width="2.5" height="46" rx="1"/>
  <text class="sub2" x="110" y="207">Full-Stack Developer &amp; Software Engineer</text>
  <text class="sub3" x="110" y="228">🇲🇦 Morocco  ·  Open to remote  ·  GMT+1</text>
</svg>
